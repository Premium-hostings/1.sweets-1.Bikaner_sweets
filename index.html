<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Loading...</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-50">

<div class="max-w-6xl mx-auto p-6">

<h1
id="shopName"
class="text-4xl font-bold text-orange-600">
Loading Shop...
</h1>

<p
id="tagLine"
class="text-lg text-gray-600 mt-2">
Loading Tagline...
</p>

<div
id="status"
class="mt-6 p-4 rounded bg-yellow-100">
Loading settings...
</div>

</div>

<script>

const SPREADSHEET_ID =
"1aULDiifd6LFPOms41yWzglTy5-lmowMDISCyFdUo36w";

const SITE_SETTINGS_URL =
`https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=SiteSettings`;

function parseCSV(csv){

const rows = csv
.trim()
.split("\n")
.map(row => row.split(","));

const headers = rows[0];

return rows
.slice(1)
.map(row => {

const obj = {};

headers.forEach((header,index)=>{

obj[header.trim()] =
(row[index] || "").trim();

});

return obj;

});

}

async function loadSettings(){

try{

document.getElementById("status")
.innerHTML =
"Fetching SiteSettings...";

const response =
await fetch(
SITE_SETTINGS_URL
);

const csv =
await response.text();

document.getElementById("status").innerHTML =
"<pre>" +
csv.substring(0,300) +
"</pre>";

const rows =
parseCSV(csv);

console.log(rows);
console.log("PARSED");
console.log(rows);

const settings = {};

rows.forEach(row=>{

settings[row.Key] =
row.Value;

});

document.title =
settings.ShopName ||
"Sweet Shop";

document
.getElementById("shopName")
.textContent =
settings.ShopName ||
"Sweet Shop";

document
.getElementById("tagLine")
.textContent =
settings.TagLine ||
"";

document
.getElementById("status")
.innerHTML =
"✅ SiteSettings Loaded Successfully";

}
catch(error){

console.error(error);

document
.getElementById("status")
.innerHTML =
"❌ ERROR: " + error.message;

}

}

loadSettings();

</script>

</body>
</html>
